name: 'Blog'
description: >
  Adds Keywords (taxonomy vocabulary + entity reference field) to the Article
  content type, a "writing" view that lists articles by date (block + page
  displays at /writing), and points the site front page at it. Depends on the
  Article type being present — apply core/recipes/standard first (or another
  recipe that installs Article).
type: Content

install:
  - taxonomy
  # dq_blog ships in this recipe's module/ directory; dq:scaffold assembles it
  # under the umbrella module before the recipe is applied. It carries the
  # Article preprocess + Schema.org JSON-LD as native OOP #[Hook] methods.
  - dq_blog

config:
  # The Keywords vocabulary and the field_keywords storage/instance config live
  # in this recipe's config/ directory and are created automatically when the
  # recipe is applied — they do not belong under config.import (which is for
  # pulling in config already provided by an installed module or theme).
  actions:
    # setComponents is a pluralized config action: each list item is unpacked as
    # the named arguments of EntityDisplayInterface::setComponent($name, $options).
    core.entity_form_display.node.article.default:
      setComponents:
        -
          name: field_keywords
          options:
            type: entity_reference_autocomplete
            weight: 15
            region: content
            settings:
              match_operator: CONTAINS
              match_limit: 10
              size: 60
              placeholder: ''
            third_party_settings: {}

    core.entity_view_display.node.article.default:
      setComponents:
        -
          name: field_keywords
          options:
            type: entity_reference_label
            label: above
            weight: 15
            region: content
            settings:
              link: true
            third_party_settings: {}

    # Point the site front page at the writing view's page display (/writing),
    # making the article index the homepage. set() is dot-aware, so this updates
    # only page.front and leaves page.403/page.404 intact.
    system.site:
      simpleConfigUpdate:
        page.front: '/writing'
